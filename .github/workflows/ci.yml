name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Bazel ${{ matrix.bazel }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        bazel:
          - 8.7.0
          - 9.2.0
    env:
      USE_BAZEL_VERSION: ${{ matrix.bazel }}
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - name: Configure Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          disk-cache: ${{ github.workflow }}-${{ matrix.bazel }}
          repository-cache: true
      - name: Run tests
        run: bazel test --lockfile_mode=off --nocache_test_results //...

  quality:
    name: Metadata and consumer
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      USE_BAZEL_VERSION: 9.2.0
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - name: Configure Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          cache-save: ${{ github.event_name != 'pull_request' }}
          disk-cache: ${{ github.workflow }}-quality
          repository-cache: true
      - name: Validate module lock
        run: bazel mod deps --lockfile_mode=error >/dev/null
      - name: Check Bazel formatting
        run: |
          bazel run --lockfile_mode=error \
            @buildifier_prebuilt//:buildifier -- \
            -mode=check -lint=warn -r "${GITHUB_WORKSPACE}"
      - name: Check GitHub Actions workflow
        run: |
          curl --fail --location --silent --show-error \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz \
            --output "${RUNNER_TEMP}/actionlint.tar.gz"
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  ${RUNNER_TEMP}/actionlint.tar.gz" \
            | sha256sum --check --strict
          tar --extract --gzip --file "${RUNNER_TEMP}/actionlint.tar.gz" \
            --directory "${RUNNER_TEMP}" actionlint
          "${RUNNER_TEMP}/actionlint" .github/workflows/*.yml
      - name: Check whitespace
        run: git diff --check 4b825dc642cb6eb9a060e54bf8d69288fbee4904 HEAD
      - name: Build as an external consumer
        working-directory: tests/consumer
        run: bazel build --lockfile_mode=off //:consumer_smoke

  real-qemu:
    name: Real QEMU/UEFI boot
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      USE_BAZEL_VERSION: 9.2.0
    steps:
      - name: Check out source
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - name: Configure Bazel
        uses: bazel-contrib/setup-bazel@c5acdfb288317d0b5c0bbd7a396a3dc868bb0f86 # 0.19.0
        with:
          bazelisk-cache: true
          repository-cache: true
      - name: Fetch content-pinned QEMU runtime
        run: |
          bazel fetch \
            --lockfile_mode=off \
            @qemu_noble_x86_64//:runtime
      - name: Exercise real QEMU guests
        run: |
          set +e
          bazel test \
            --lockfile_mode=off \
            --local_test_jobs=1 \
            --nocache_test_results \
            --test_output=errors \
            //tests/integration:real_qemu_efi_shell_test \
            //tests/integration:real_qemu_aarch64_efi_shell_test \
            //tests/integration:real_qemu_scripted_control_test \
            //tests/integration:real_cirros_cloud_test \
            //tests/integration:real_cirros_aarch64_cloud_test \
            //tests/integration:real_cirros_kvm_test \
            //tests/integration:real_cirros_shutdown_test \
            //tests/integration:real_cirros_scripted_media_test \
            //tests/integration/media_matrix:real_cirros_cdrom_test \
            //tests/integration/media_matrix:real_efi_shell_media_test \
            //tests/integration/media_matrix:real_efi_shell_usb_readonly_test \
            //tests/integration/media_matrix:real_efi_shell_nvme_readonly_test \
            //tests/integration/lab_matrix:real_cirros_lab_tcg_test \
            2>&1 | tee "${RUNNER_TEMP}/real-qemu.log"
          bazel_status=${PIPESTATUS[0]}
          set -e
          if (( bazel_status != 0 )); then
            failure_summary=$(
              tail -n 120 "${RUNNER_TEMP}/real-qemu.log" |
                awk '
                  BEGIN { remaining = 30000 }
                  {
                    gsub(/%/, "%25")
                    gsub(/\r/, "%0D")
                    line = $0 "%0A"
                    if (length(line) > remaining) {
                      printf "%s", substr(line, 1, remaining)
                      exit
                    }
                    printf "%s", line
                    remaining -= length(line)
                  }
                '
            )
            echo "::error title=Real QEMU test output::${failure_summary}"
            while IFS= read -r diagnostic_log; do
              diagnostic_summary=$(
                tail -n 100 "${diagnostic_log}" |
                  awk '
                    BEGIN { remaining = 20000 }
                    {
                      gsub(/%/, "%25")
                      gsub(/\r/, "%0D")
                      line = $0 "%0A"
                      if (length(line) > remaining) {
                        printf "%s", substr(line, 1, remaining)
                        exit
                      }
                      printf "%s", line
                      remaining -= length(line)
                    }
                  '
              )
              if [[ -n "${diagnostic_summary}" ]]; then
                diagnostic_name=${diagnostic_log#bazel-testlogs/}
                echo "::error title=${diagnostic_name}::${diagnostic_summary}"
              fi
            done < <(
              find -L bazel-testlogs -type f \
                \( -name test.log -o -name '*qemu.log' \) \
                -size +0c |
                sort |
                head -n 20
            )
          fi
          exit "${bazel_status}"
